<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 768">
  <defs>
    <style>
      .bg { fill: #1a1a2e; }
      .wave { fill: #3a4a5a; }
      .text { fill: #ffffff; font-family: Arial, sans-serif; font-weight: bold; }
      .subtext { fill: #cccccc; font-family: Arial, sans-serif; font-size: 14px; letter-spacing: 3px; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect class="bg" width="768" height="768"/>
  
  <!-- Top wave -->
  <path class="wave" d="M 0 150 Q 192 50 384 100 T 768 150 L 768 0 L 0 0 Z"/>
  
  <!-- Bottom wave -->
  <path class="wave" d="M 0 650 Q 192 750 384 650 T 768 650 L 768 768 L 0 768 Z"/>
  
  <!-- CMONIT Logo Text (simplified) -->
  <text x="384" y="350" class="text" font-size="80" text-anchor="middle">CMONIT</text>
  
  <!-- Subtitle -->
  <text x="384" y="420" class="subtext" font-size="20" text-anchor="middle">centro de contacto</text>
</svg>